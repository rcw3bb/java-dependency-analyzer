// Groovy DSL build.gradle test fixture
plugins {
    id 'java'
}

ext {
    resolvedVersion = '3.9.1'
}

dependencies {
    // Shorthand notation
    implementation 'org.apache.logging.log4j:log4j-core:2.14.1'
    api 'com.google.guava:guava:31.0-jre'
    runtimeOnly 'org.postgresql:postgresql:42.3.1'

    // Block notation
    implementation group: 'org.springframework', name: 'spring-core', version: '5.3.20'

    // Test dependency - should be excluded
    testImplementation 'junit:junit:4.13.2'

    // Unresolved version variable - should be skipped
    implementation "com.example:some-lib:${someVersion}"

    // Duplicate - should appear once only
    implementation 'org.apache.logging.log4j:log4j-core:2.14.1'

    // Resolved ext-block variable - should be included
    implementation "org.yaml:snakeyaml:${resolvedVersion}"
}
